<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ez="http://xmlns.jcp.org/jsf/composite/ezcomp">

    <h:body>

        <ui:composition template="/institution/reports_index.xhtml">
            <ui:define name="title">
                Institution Counts - Copy/Forwards
            </ui:define>
            <ui:define name="reports">
                <p:growl />
                <h:form>
                    <div class="card my-3">
                        <h5 class="card-header bg-primary">
                            <p:outputLabel class="text-white fs-5 fw-bold my-2" value="Institution Counts - Copy/Forwards" />
                        </h5>
                        <div class="card-body">
                            <div class="row">
                                <div class="col">
                                    <h:panelGrid columns="2">
                                        <p:panelGrid columns="2" class="border border-light">

                                            <h:outputLabel class="fs-6" value="From:" />
                                            <p:datePicker monthNavigator="true" yearNavigator="true"
                                                          class="fs-6 fw-bold"
                                                          showTime="true"
                                                          pattern="dd MMMM yyyy hh:mm a"
                                                          value="#{letterController.fromDate}" />
                                            <h:outputLabel class="fs-6" value="To:" />
                                            <p:datePicker class="fs-6 fw-bold"
                                                          monthNavigator="true" yearNavigator="true"
                                                          showTime="true"
                                                          pattern="dd MMMM yyyy hh:mm a"
                                                          value="#{letterController.toDate}" />
                                        </p:panelGrid>

                                        <h:panelGrid columns="1">
                                            <h:commandButton value="Process" action="#{letterController.listCopyForwardInstitutionCounts()}" class="btn btn-danger form-control" />
                                            <h:commandButton value="Print" class="btn btn-success form-control">
                                                <p:printer target="tbl" />
                                            </h:commandButton>
                                            <h:commandButton value="Download" class="btn btn-warning form-control">
                                                <p:dataExporter target="tbl" type="xls" fileName="Count of Copy Forwards by Institution" />
                                            </h:commandButton>
                                        </h:panelGrid>

                                    </h:panelGrid>

                                    <p:dataTable value="#{letterController.copyForwardInstitutionCounts}"
                                                 var="h"
                                                 rowKey="#{h.institution.id}"
                                                 id="tbl"
                                                 style="width: 100%;"
                                                 rows="10"
                                                 paginator="true"
                                                 paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                                 currentPageReportTemplate="{startRecord}-{endRecord} of {totalRecords} records"
                                                 rowsPerPageTemplate="5,10,{ShowAll|'All'}">

                                        <p:column headerText="Institution" sortBy="#{h.institution.name}" filterBy="#{h.institution.name}" filterMatchMode="contains">
                                            <h:outputText value="#{h.institution.name}" />
                                        </p:column>
                                        <p:column headerText="Total" sortBy="#{h.count}">
                                            <h:outputText value="#{h.count}" />
                                        </p:column>
                                        <p:column headerText="Received" sortBy="#{h.receivedCount}">
                                            <h:outputText value="#{h.receivedCount}" style="color: #00b894; font-weight: bold;" />
                                        </p:column>
                                        <p:column headerText="Pending" sortBy="#{h.pendingCount}">
                                            <h:outputText value="#{h.pendingCount}" style="color: #f39c12; font-weight: bold;" />
                                        </p:column>

                                    </p:dataTable>
                                </div>
                            </div>
                        </div>
                    </div>

                </h:form>

            </ui:define>
        </ui:composition>
    </h:body>
</html>
